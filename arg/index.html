<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Operação 1954: O Thriller Silencioso</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="desk">
        <div class="overlay"></div>
        
        <header>
            <h1>CLASSIFICADO: ARQUIVO 50s</h1>
            <p>Sintonize a verdade. O tempo está correndo.</p>
        </header>

        <div class="investigation-area">
            <div class="radio-container">
                <div class="dial">
                    <input type="range" id="frequency" min="0" max="100" value="0">
                </div>
                <div id="radio-status">SINAL PERDIDO...</div>
            </div>

            <div id="dossier" class="folder locked">
                <div class="paper">
                    <h2 id="doc-title">???</h2>
                    <p id="doc-content">Aproxime-se do rádio para interceptar a transmissão oficial. O que aconteceu no Palácio do Catete?</p>
                    <div class="stamp">RETIDO</div>
                </div>
            </div>
        </div>

        <div class="clue-footer">
            <p>Dica: A verdade sobre 1954 está na frequência <strong>54</strong>.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
